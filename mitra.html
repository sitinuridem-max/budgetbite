<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetBite Mitra - Dashboard Restoran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bb-green': '#22C55E',
                        'bb-orange': '#F97316',
                        'bb-yellow': '#FACC15',
                        'bb-gray': '#6B7280',
                        'bb-light': '#F9FAFB',
                    },
                    fontFamily: {
                        sans: ['Poppins', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bb-light font-sans text-slate-800 min-h-screen">

    <!-- Navbar Mitra -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 px-8 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 bg-bb-orange rounded-full flex items-center justify-center overflow-hidden">
                <span class="text-white font-bold text-xs">M</span>
            </div>
            <span class="text-xl font-bold text-bb-green">Budget<span class="text-bb-orange">Bite</span> <span class="text-slate-400 font-medium text-sm">Mitra</span></span>
        </div>
        <div class="flex items-center space-x-6 text-sm font-semibold text-slate-600">
            <!-- Link untuk kembali ke halaman utama pembeli -->
            <a href="index.html" class="hover:text-bb-green transition">Lihat Aplikasi Utama</a>
            <div class="flex items-center space-x-2 pl-4 border-l border-slate-200">
                <span class="text-slate-700 font-semibold" id="restoNameHeader">Kantin Hebat</span>
                <div class="w-8 h-8 bg-slate-200 rounded-full flex items-center justify-center text-slate-600 font-bold text-xs">KH</div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-6 md:py-10 grid grid-cols-1 md:grid-cols-4 gap-6 md:gap-8">
        <!-- Form Input Menu Baru (Kiri) -->
        <aside class="md:col-span-1 bg-white border border-slate-200/80 p-5 md:p-6 rounded-2xl shadow-sm md:h-fit sticky md:top-24">
            <div class="mb-5">
                <h2 class="text-lg font-bold text-slate-800 leading-tight">Tambah <span class="text-bb-orange">Menu Baru</span></h2>
                <p class="text-xs text-bb-gray mt-1.5">Isi detail makanan/minuman agar tampil di pencarian budget mahasiswa.</p>
            </div>

            <form id="menuForm" onsubmit="addMenu(event)" class="space-y-4">
                <input type="hidden" id="restoName" value="Kantin Hebat">
                <div>
                    <label for="menuName" class="block text-xs font-semibold text-slate-700 mb-1.5">Nama Menu :</label>
                    <input type="text" id="menuName" class="block w-full px-4 py-2 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-bb-orange text-sm" placeholder="Contoh: Nasi Ayam Bakar" required>
                </div>
                <div>
                    <label for="menuPrice" class="block text-xs font-semibold text-slate-700 mb-1.5">Harga Jual (Rp) :</label>
                    <div class="relative rounded-xl shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="text-slate-400 font-bold text-sm">Rp</span>
                        </div>
                        <input type="number" id="menuPrice" class="block w-full pl-11 pr-4 py-2 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-bb-orange font-bold text-sm" placeholder="15000" required>
                    </div>
                </div>
                <div>
                    <label for="menuCategory" class="block text-xs font-semibold text-slate-700 mb-1.5">Kategori :</label>
                    <select id="menuCategory" class="block w-full px-4 py-2 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-bb-orange text-sm" required>
                        <option value="makanan">Makanan</option>
                        <option value="minuman">Minuman</option>
                        <option value="combo">Combo Paket</option>
                    </select>
                </div>
                <div>
                    <label for="menuTag" class="block text-xs font-semibold text-slate-700 mb-1.5">Label / Tag Promo :</label>
                    <input type="text" id="menuTag" class="block w-full px-4 py-2 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-bb-orange text-sm" placeholder="Contoh: Laris, Hemat, Pedas">
                </div>
                <div>
                    <label for="menuImage" class="block text-xs font-semibold text-slate-700 mb-1.5">Foto Makanan :</label>
                    <input type="file" id="menuImage" accept="image/*" class="block w-full px-4 py-2 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-bb-orange text-xs bg-slate-50">
                </div>
                <button type="submit" class="w-full bg-bb-orange hover:bg-orange-600 text-white font-semibold py-2.5 px-4 rounded-xl transition text-sm">
                    Tampilkan Menu Ini
                </button>
            </form>
        </aside>

        <!-- Daftar Menu Mitra (Kanan) -->
        <main class="md:col-span-3 space-y-5">
            <div class="flex justify-between items-center px-1">
                <div>
                    <h3 class="text-base font-bold text-slate-800 tracking-tight">Daftar Menu Restoran Anda</h3>
                    <p class="text-xs text-bb-gray">Menu yang aktif dan dapat dicari oleh mahasiswa.</p>
                </div>
                <span id="myMenuCount" class="text-xs bg-orange-100 text-bb-orange px-2.5 py-1 rounded-md font-semibold">0 Menu</span>
            </div>
            <div id="merchantMenuContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </main>
    </div>

    <script>
        // Mengambil database allMenus dari localStorage jika ada, atau gunakan default mitra
        let defaultMenus = [
            {name: 'Nasi Ayam Geprek', price: 12000, resto: 'Kantin Hebat', image: '', category: 'makanan', tag: 'Laris'},
            {name: 'Combo Worth It (Nasi + Ayam + Es Teh)', price: 15000, resto: 'Kantin Hebat', image: '', category: 'combo', tag: 'Best Combo'},
            {name: 'Es Teh Manis', price: 3000, resto: 'Kantin Hebat', image: '', category: 'minuman', tag: 'Segar'}
        ];

        let myMenus = JSON.parse(localStorage.getItem('sharedMenus')) || defaultMenus;

        function formatRupiah(number) { return new Intl.NumberFormat('id-ID').format(number); }

    function renderMerchantMenus() {
    const container = document.getElementById('merchantMenuContainer');
    // Tambahkan pengaman jika container tidak ditemukan di HTML
    if (!container) return; 
    
    container.innerHTML = '';
    
    // Update jumlah menu di badge atas
    const countBadge = document.getElementById('myMenuCount');
    if (countBadge) {
        countBadge.innerText = `${myMenus.length} Menu Terdaftar`;
    }

    // Jika menu kosong, tampilkan info kosong (opsional jika ada element-nya)
    const emptyState = document.getElementById('emptyMerchantState');
    if (myMenus.length === 0) {
        if (emptyState) emptyState.classList.remove('hidden');
        return;
    } else {
        if (emptyState) emptyState.classList.add('hidden');
    }

    myMenus.forEach((menu, index) => {
        // PERBAIKAN DI SINI: Deteksi apakah menu.image berisi file upload (Base64) atau teks biasa
        let imgUrl = 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500&auto=format&fit=crop&q=60';
        
        if (menu.image && menu.image.trim() !== '') {
            imgUrl = menu.image;
        }
        
        // Render struktur kartu dengan aman
        const card = `
            <div class="bg-white border border-slate-200/70 rounded-2xl overflow-hidden shadow-sm flex flex-col justify-between h-auto relative">
                <div class="relative w-full h-32 flex-shrink-0 bg-slate-100">
                    <img src="${imgUrl}" alt="${menu.name}" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500&auto=format&fit=crop&q=60'">
                    <span class="absolute top-2 left-2 bg-bb-orange text-white text-[9px] font-bold px-2 py-0.5 rounded-md shadow-sm">
                        ${menu.tag || 'Baru'}
                    </span>
                    <span class="absolute top-2 right-2 bg-slate-900/70 text-white text-[9px] px-2 py-0.5 rounded-md capitalize">
                        ${menu.category || 'Makanan'}
                    </span>
                </div>
                <div class="p-3 flex-1 flex flex-col justify-between">
                    <div>
                        <h4 class="font-bold text-xs md:text-sm text-slate-800 truncate mb-0.5">${menu.name}</h4>
                        <p class="text-[13px] font-bold text-bb-green mt-1">
                            Rp ${formatRupiah(menu.price)}
                        </p>
                    </div>
                    <div class="mt-3 pt-2 border-t border-slate-100 flex justify-end">
                        <button onclick="deleteMenu(${index})" class="text-xs text-red-500 font-medium hover:text-red-700 transition">
                            Hapus Menu
                        </button>
                    </div>
                </div>
            </div>
        `;
        container.innerHTML += card;
    });
}
            });
        }

    function addMenu(event) {
    event.preventDefault();

    const name = document.getElementById('menuName').value;
    const price = parseInt(document.getElementById('menuPrice').value) || 0;
    const category = document.getElementById('menuCategory').value;
    const tag = document.getElementById('menuTag').value || 'Baru';
    const resto = document.getElementById('restoName').value;
    
    // Ambil file gambar dari input
    const imageInput = document.getElementById('menuImage');
    const file = imageInput.files[0];

    // Jika ada file yang diupload, proses gambarnya
    if (file) {
        const reader = new FileReader();
        reader.onloadend = function() {
            const base64Image = reader.result; // Ini adalah data gambar kamu

            // Simpan ke array
            myMenus.unshift({ name, price, category, tag, image: base64Image, resto });
            localStorage.setItem('sharedMenus', JSON.stringify(myMenus));

            // Reset form dan render ulang
            document.getElementById('menuForm').reset();
            renderMerchantMenus();
            alert('Sukses menambahkan menu dengan gambar baru!');
        }
        reader.readAsDataURL(file);
    } else {
        // Jika tidak upload gambar, pakai gambar default kosong
        myMenus.unshift({ name, price, category, tag, image: '', resto });
        localStorage.setItem('sharedMenus', JSON.stringify(myMenus));
        
        document.getElementById('menuForm').reset();
        renderMerchantMenus();
        alert('Sukses menambahkan menu (Tanpa Gambar)!');
    }
}
